<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Solver DFS | Puzzle Lineal</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						fontFamily: {
							display: ["Space Grotesk", "sans-serif"],
						},
					},
				},
			};
		</script>
	</head>
	<body
		class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-100 to-rose-100 font-display text-slate-800"
	>
		<div class="relative overflow-hidden">
			<div
				class="pointer-events-none absolute -left-24 -top-20 h-72 w-72 rounded-full bg-orange-300/40 blur-3xl"
			></div>
			<div
				class="pointer-events-none absolute -right-28 top-48 h-80 w-80 rounded-full bg-rose-300/35 blur-3xl"
			></div>

			<main class="relative mx-auto flex w-full max-w-5xl flex-col gap-8 p-6 md:p-10">
				<header class="animate-[fadeIn_0.7s_ease-out]">
					<p class="text-sm font-semibold uppercase tracking-[0.2em] text-orange-700">
						API Flask + DFS
					</p>
					<h1 class="mt-2 text-4xl font-bold leading-tight md:text-5xl">
						Puzzle lineal con busqueda en profundidad
					</h1>
					<p class="mt-3 max-w-2xl text-base text-slate-600 md:text-lg">
						Define estado inicial y estado objetivo para calcular la ruta con el
						endpoint <span class="font-semibold">/calcular</span>.
					</p>
				</header>

				<section
					class="animate-[slideUp_0.8s_ease-out] rounded-3xl border border-white/60 bg-white/70 p-6 shadow-xl backdrop-blur-sm md:p-8"
				>
					<form id="solver-form" class="grid gap-5 md:grid-cols-2">
						<label class="flex flex-col gap-2">
							<span class="text-sm font-semibold uppercase tracking-wide text-slate-600"
								>Estado inicial</span
							>
							<input
								id="inicio"
								type="text"
								required
								placeholder="Ej: 4,2,3,1"
								class="w-full rounded-2xl border border-slate-300/70 bg-white px-4 py-3 text-lg shadow-sm outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
							/>
						</label>

						<label class="flex flex-col gap-2">
							<span class="text-sm font-semibold uppercase tracking-wide text-slate-600"
								>Estado objetivo</span
							>
							<input
								id="final"
								type="text"
								required
								placeholder="Ej: 1,2,3,4"
								class="w-full rounded-2xl border border-slate-300/70 bg-white px-4 py-3 text-lg shadow-sm outline-none transition focus:border-rose-500 focus:ring-2 focus:ring-rose-200"
							/>
						</label>

						<div class="md:col-span-2 flex flex-wrap items-center gap-3 pt-1">
							<button
								type="submit"
								id="solve-btn"
								class="rounded-2xl bg-slate-900 px-6 py-3 text-sm font-semibold uppercase tracking-wide text-white transition hover:-translate-y-0.5 hover:bg-slate-700"
							>
								Calcular ruta
							</button>
							<button
								type="button"
								id="example-btn"
								class="rounded-2xl border border-slate-300 bg-white px-6 py-3 text-sm font-semibold uppercase tracking-wide text-slate-700 transition hover:-translate-y-0.5 hover:border-slate-900"
							>
								Cargar ejemplo
							</button>
							<p id="status" class="text-sm text-slate-600"></p>
						</div>
					</form>
				</section>

				<section
					class="animate-[slideUp_1s_ease-out] rounded-3xl border border-white/60 bg-white/75 p-6 shadow-xl backdrop-blur-sm md:p-8"
				>
					<div class="mb-4 flex items-end justify-between">
						<h2 class="text-2xl font-bold">Ruta encontrada</h2>
						<span id="steps-count" class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600"
							>0 pasos</span
						>
					</div>

					<div id="results" class="grid gap-3"></div>
				</section>
			</main>
		</div>

		<script src="./main.js"></script>

		<style>
			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}

			@keyframes slideUp {
				from {
					opacity: 0;
					transform: translateY(18px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</body>
</html>
